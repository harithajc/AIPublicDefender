<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | AI Public Defender</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #102a43;
            --brand: #0f4c81;
            --brand-strong: #0b2f55;
            --accent: #ffb703;
            --surface: #ffffff;
            --surface-soft: #f5f8fa;
            --danger-bg: #ffe8e6;
            --danger-border: #d94732;
            --danger-text: #8a1f14;
            --ring: rgba(10, 93, 92, 0.25);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Manrope', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 15%, rgba(15, 76, 129, 0.22), transparent 35%),
                radial-gradient(circle at 90% 85%, rgba(11, 47, 85, 0.18), transparent 35%),
                linear-gradient(135deg, #f1f7ff 0%, #eaf3ff 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .signin-shell {
            width: 100%;
            max-width: 980px;
            background: var(--surface);
            border: 1px solid rgba(16, 42, 67, 0.08);
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 22px 50px rgba(16, 42, 67, 0.14);
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            animation: card-reveal 600ms ease-out;
        }

        .signin-aside {
            padding: 44px 36px;
            background:
                linear-gradient(160deg, #0b2f55 0%, #0f4c81 52%, #1a6aa3 100%);
            color: #f8fffe;
            position: relative;
        }

        .signin-aside::after {
            content: "";
            position: absolute;
            width: 240px;
            height: 240px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            top: -100px;
            right: -80px;
        }

        .brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.2px;
            margin: 0 0 18px;
        }

        .aside-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            line-height: 1.2;
            margin: 0 0 12px;
        }

        .aside-text {
            margin: 0;
            opacity: 0.92;
            line-height: 1.6;
        }

        .signin-panel {
            padding: 42px 36px;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .panel-title {
            font-family: 'Space Grotesk', sans-serif;
            margin: 0 0 8px;
            font-size: 1.7rem;
            color: var(--ink);
        }

        .panel-subtitle {
            margin: 0 0 24px;
            color: #4f677d;
            font-size: 0.98rem;
        }

        .field-wrap {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.92rem;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #c4d1de;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 140ms ease, box-shadow 140ms ease;
            background: var(--surface-soft);
        }

        input:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 4px var(--ring);
            background: #fff;
        }

        .password-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
        }

        .toggle-btn {
            border: 1px solid #c4d1de;
            border-radius: 12px;
            padding: 0 14px;
            background: #eef5ff;
            color: var(--ink);
            font-weight: 700;
            cursor: pointer;
        }

        .primary-btn {
            width: 100%;
            border: none;
            border-radius: 13px;
            background: linear-gradient(180deg, var(--brand) 0%, var(--brand-strong) 100%);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            padding: 13px 16px;
            cursor: pointer;
            transition: transform 130ms ease, filter 130ms ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            box-shadow: 0 12px 20px rgba(11, 47, 85, 0.24);
        }

        .primary-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            filter: brightness(1.03);
        }

        .primary-btn:disabled {
            cursor: not-allowed;
            opacity: 0.85;
        }

        .loading-spinner {
            width: 17px;
            height: 17px;
            border: 2px solid rgba(255, 255, 255, 0.45);
            border-top-color: #fff;
            border-radius: 50%;
            display: none;
            animation: spin 0.8s linear infinite;
        }

        .error-box {
            margin-top: 14px;
            padding: 11px 13px;
            border: 1px solid var(--danger-border);
            border-radius: 10px;
            color: var(--danger-text);
            background: var(--danger-bg);
            display: none;
            font-size: 0.92rem;
            font-weight: 600;
        }

        .helper-row {
            margin-top: 18px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .helper-row a {
            color: var(--brand);
            font-weight: 700;
            text-decoration: none;
            font-size: 0.92rem;
        }

        .helper-row a:hover {
            text-decoration: underline;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes card-reveal {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.99);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 860px) {
            .signin-shell {
                grid-template-columns: 1fr;
            }

            .signin-aside,
            .signin-panel {
                padding: 30px 24px;
            }

            .aside-title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <main class="signin-shell">
        <section class="signin-aside">
            <p class="brand">AI Public Defender</p>
            <h1 class="aside-title">Secure access to your legal workspace</h1>
            <p class="aside-text">
                Sign in to continue with case history, saved legal roadmaps, and personalized recommendations.
            </p>
        </section>

        <section class="signin-panel">
            <h2 class="panel-title">Sign In</h2>
            <p class="panel-subtitle">Use your email or username and password to continue.</p>

            <form id="signinForm" novalidate>
                <div class="field-wrap">
                    <label for="identity">Email or Username</label>
                    <input
                        id="identity"
                        name="identity"
                        type="text"
                        autocomplete="username"
                        placeholder="you@example.com or haritha"
                        required
                    >
                </div>

                <div class="field-wrap">
                    <label for="password">Password</label>
                    <div class="password-row">
                        <input
                            id="password"
                            name="password"
                            type="password"
                            autocomplete="current-password"
                            placeholder="Enter your password"
                            required
                        >
                        <button type="button" id="togglePassword" class="toggle-btn" aria-label="Show password">Show</button>
                    </div>
                </div>

                <button type="submit" id="signinBtn" class="primary-btn">
                    <span id="loadingSpinner" class="loading-spinner" aria-hidden="true"></span>
                    <span id="btnText">Sign In</span>
                </button>

                <div id="errorBox" class="error-box" role="alert" aria-live="polite"></div>

                <div class="helper-row">
                    <a href="/app">Back to app</a>
                    <a href="#">Forgot password?</a>
                </div>
            </form>
        </section>
    </main>

    <script>
        const signinForm = document.getElementById('signinForm');
        const identityInput = document.getElementById('identity');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const signinBtn = document.getElementById('signinBtn');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const btnText = document.getElementById('btnText');
        const errorBox = document.getElementById('errorBox');

        function showError(message) {
            errorBox.textContent = message;
            errorBox.style.display = 'block';
        }

        function clearError() {
            errorBox.textContent = '';
            errorBox.style.display = 'none';
        }

        function setLoadingState(isLoading) {
            signinBtn.disabled = isLoading;
            loadingSpinner.style.display = isLoading ? 'inline-block' : 'none';
            btnText.textContent = isLoading ? 'Signing In...' : 'Sign In';
        }

        togglePasswordBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            togglePasswordBtn.textContent = isPassword ? 'Hide' : 'Show';
            togglePasswordBtn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
        });

        signinForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            clearError();

            const identity = identityInput.value.trim();
            const password = passwordInput.value;

            if (!identity) {
                showError('Please enter your email or username.');
                return;
            }

            if (!password) {
                showError('Please enter your password.');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters long.');
                return;
            }

            setLoadingState(true);

            try {
                // Simulate API latency for loading-state UX.
                await new Promise((resolve) => setTimeout(resolve, 1200));

                // Placeholder flow until backend authentication is added.
                window.location.href = '/app';
                return;
            } catch (error) {
                showError('Sign in failed. Please try again.');
            } finally {
                setLoadingState(false);
            }
        });
    </script>
</body>
</html>
