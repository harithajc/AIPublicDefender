<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Legal Roadmap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-900: #0b2f55;
            --brand-700: #0f4c81;
            --brand-100: #e8f1fb;
            --ink-900: #102a43;
            --line-soft: rgba(11, 47, 85, 0.14);
            --shadow-soft: 0 14px 34px rgba(16, 42, 67, 0.10);
        }
        body { 
            background:
                radial-gradient(circle at 0% 0%, rgba(15, 76, 129, 0.14), transparent 34%),
                radial-gradient(circle at 100% 0%, rgba(11, 47, 85, 0.10), transparent 30%),
                linear-gradient(180deg, #f5f9ff 0%, #f8fbff 100%);
            font-family: 'Noto Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--ink-900);
        }
        .roadmap-container {
            max-width: 850px;
            margin: 40px auto;
            padding: 40px;
            border: 1px solid var(--line-soft);
            border-radius: 18px;
            box-shadow: 0 20px 44px rgba(16, 42, 67, 0.12);
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(2px);
        }
        .doc-header {
            border-bottom: 3px solid var(--brand-900);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .btn-print {
            background: linear-gradient(135deg, var(--brand-900) 0%, var(--brand-700) 100%);
            color: white;
            border: 0;
            box-shadow: 0 10px 18px rgba(11, 47, 85, 0.22);
        }
        .btn-print:hover {
            color: white;
            filter: brightness(1.03);
        }
        .btn-outline-secondary {
            border-color: rgba(11, 47, 85, 0.26);
            color: var(--brand-900);
        }
        .btn-outline-secondary:hover {
            background: var(--brand-100);
            color: var(--brand-900);
            border-color: rgba(11, 47, 85, 0.26);
        }
        #readAloudBtn {
            background: #d8ebff;
            border: 1px solid #a8caee;
            color: var(--brand-900);
            box-shadow: 0 8px 16px rgba(11, 47, 85, 0.14);
        }
        #readAloudBtn:hover {
            filter: brightness(1.02);
        }
        /* This hides the print button when the user exports to PDF! */
        @media print {
            .no-print { display: none !important; }
            .roadmap-container { border: none; box-shadow: none; margin: 0; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="d-flex justify-content-between align-items-center mt-4 no-print" style="max-width: 850px; margin: auto;">
        <button onclick="window.location.href='/app'" class="btn btn-outline-secondary">← Back to Form</button>
        <div>
            <button id="readAloudBtn" class="btn btn-info fw-bold me-2">🗣️ Read Aloud</button>
            <button onclick="window.print()" class="btn btn-print fw-bold">⬇️ Download as PDF</button>
        </div>
    </div>

    <div class="roadmap-container">
        <div class="doc-header d-flex justify-content-between align-items-end">
            <div>
                <h1 style="color: #003366; font-weight: 800;">AI Public Defender</h1>
                <h4 class="text-muted">Custom Legal Roadmap</h4>
            </div>
            <div class="text-end text-muted small">
                Generated: <span id="dateText"></span><br>
                Jurisdiction: Indian Law
            </div>
        </div>

        <div id="roadmapContent" style="line-height: 1.8;">
            <div class="text-center mt-5 text-muted">Loading your roadmap...</div>
        </div>
    </div>
</div>

<script>
    // 1. Set today's date
    const dateOptions = { year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('dateText').innerText = new Date().toLocaleDateString('en-IN', dateOptions);

    // 2. Grab the AI data from browser memory
    const roadmapData = localStorage.getItem('legalRoadmap');
    
    if (roadmapData) {
        document.getElementById('roadmapContent').innerHTML = roadmapData;
    } else {
        document.getElementById('roadmapContent').innerHTML = "<div class='alert alert-danger'>No roadmap data found. Please generate it from the main form.</div>";
    }

    // 3. Text-to-Speech functionality
    const readAloudBtn = document.getElementById('readAloudBtn');
    const synth = window.speechSynthesis;
    let isSpeaking = false;

    // Get the language from localStorage
    const selectedLanguage = localStorage.getItem('legalLanguage') || 'English';
    
    // Map language to language code for speech synthesis
    const languageMap = {
        'English': 'en-US',
        'Kannada': 'kn-IN',
        'Hindi': 'hi-IN',
        'Marathi': 'mr-IN'
    };

    readAloudBtn.addEventListener('click', () => {
        const contentText = document.getElementById('roadmapContent').innerText;

        if (isSpeaking) {
            synth.cancel();
            readAloudBtn.textContent = '🗣️ Read Aloud';
            isSpeaking = false;
            return;
        }

        if (contentText.includes('No roadmap data found')) {
            alert('No roadmap to read. Please generate one first.');
            return;
        }

        const utterance = new SpeechSynthesisUtterance(contentText);
        utterance.lang = languageMap[selectedLanguage] || 'en-US';
        utterance.rate = 1;
        utterance.pitch = 1;
        utterance.volume = 1;

        utterance.onstart = () => {
            isSpeaking = true;
            readAloudBtn.textContent = '⏹️ Stop Reading';
        };

        utterance.onend = () => {
            isSpeaking = false;
            readAloudBtn.textContent = '🗣️ Read Aloud';
        };

        utterance.onerror = (event) => {
            console.error('Speech synthesis error:', event.error);
            isSpeaking = false;
            readAloudBtn.textContent = '🗣️ Read Aloud';
        };

        synth.speak(utterance);
    });
</script>

</body>
</html>
